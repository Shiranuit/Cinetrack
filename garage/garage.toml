# Garage single-node dev config. Secrets come from env (GARAGE_RPC_SECRET,
# GARAGE_ADMIN_TOKEN) so they stay out of this file — do NOT add rpc_secret here.
metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "lmdb"

# Single node: one replica, no redundancy.
replication_factor = 1

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "127.0.0.1:3901"

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"
root_domain = ".s3.garage.localhost"

[s3_web]
bind_addr = "[::]:3902"
root_domain = ".web.garage.localhost"
index = "index.html"

[admin]
api_bind_addr = "[::]:3903"
# admin_token supplied via GARAGE_ADMIN_TOKEN env var
