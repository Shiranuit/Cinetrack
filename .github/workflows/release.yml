name: Release

# On a version tag (v*): build the Flutter APK and attach it to the GitHub
# Release, build & push the backend image to GHCR, then deploy to the Dedibox
# over SSH. `workflow_dispatch` builds the APK + image without releasing/deploying.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ---- Flutter Android APK -> release artifact --------------------------------
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          # Pin to the dev Flutter — `channel: stable` + cache can reuse a stale
          # stable (older compileSdk / Dart). Bump when you upgrade Flutter locally.
          flutter-version: 3.44.4
          cache: true

      - name: Configure release signing
        working-directory: frontend/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/release-keystore.jks
            {
              echo "storeFile=release-keystore.jks"
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "keyPassword=$KEY_PASSWORD"
            } > key.properties
            echo "Release signing configured (real keystore)."
          else
            echo "::warning::KEYSTORE_BASE64 not set — APK will be DEBUG-signed and will NOT update in place across releases."
          fi

      - name: Build release APKs (fat for the web + per-ABI splits for the app)
        working-directory: frontend
        run: |
          flutter pub get
          # Derive the Android versionName/versionCode from the git tag so the
          # installed app reports the released version instead of pubspec's
          # placeholder 1.0.0. Tag is like "v0.5.0" -> name 0.5.0.
          VERSION_ARGS=""
          if [ "${{ github.ref_type }}" = "tag" ]; then
            NAME="${{ github.ref_name }}"
            NAME="${NAME#v}"                       # strip leading "v"
            CORE="${NAME%%[-+]*}"                   # drop any -pre / +meta suffix
            IFS='.' read -r MAJ MIN PAT <<< "$CORE"
            # Monotonic integer versionCode: major*1000000 + minor*1000 + patch.
            CODE=$(( ${MAJ:-0} * 1000000 + ${MIN:-0} * 1000 + ${PAT:-0} ))
            VERSION_ARGS="--build-name=$NAME --build-number=$CODE"
            echo "Building APK versionName=$NAME versionCode=$CODE"
          fi
          # Bake the release tag into the Dart Config.appVersion. Without this the app
          # thinks it is "dev" and the update check silently no-ops (dev builds never
          # nag), so no update banner or forced-update screen ever appears. This is the
          # Dart-level version the update logic compares; --build-name above is a
          # SEPARATE Android versionName for the system app-info screen.
          APP_VER="${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}"
          DEFINES="--dart-define=API_BASE=${{ vars.API_BASE || 'https://api.cine-track.com' }}"
          DEFINES="$DEFINES --dart-define=APP_VERSION=${APP_VER}"
          DEFINES="$DEFINES --dart-define=GITHUB_REPO=${{ github.repository }}"

          VERSION="${{ github.ref_type == 'tag' && github.ref_name || format('dev-{0}', github.sha) }}"
          mkdir -p ../dist

          # Every asset is version-named. The app already knows which version to fetch:
          # the web build bakes its own version, and the backend reports the newest one
          # over /api/config (it deploys in lockstep with releases). So there is no need
          # for a floating "latest" alias.

          # 1) Fat APK (all ABIs) — the web install button hands this out because a
          #    browser can't probe the visitor's phone CPU.
          flutter build apk --release $DEFINES $VERSION_ARGS
          cp build/app/outputs/flutter-apk/app-release.apk "../dist/cinetrack-${VERSION}.apk"

          # 2) Per-ABI splits — ~a third the size; the in-app updater downloads the one
          #    matching the device's ABI.
          flutter build apk --release --split-per-abi $DEFINES $VERSION_ARGS
          for ABI in arm64-v8a armeabi-v7a x86_64; do
            cp "build/app/outputs/flutter-apk/app-${ABI}-release.apk" "../dist/cinetrack-${VERSION}-${ABI}.apk"
          done
          ls -lh ../dist

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: dist/*.apk
          if-no-files-found: error

  # ---- Backend image -> GHCR --------------------------------------------------
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/cinetrack-backend
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=sha,enable=${{ github.ref_type != 'tag' }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          # Bake the release tag in so GET /api/config reports the running version.
          build-args: |
            APP_VERSION=${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- Web app image (Flutter web + Caddy) -> GHCR ----------------------------
  web-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/cinetrack-web
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=sha,enable=${{ github.ref_type != 'tag' }}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          # Baked into the web bundle: API origin, this release tag (so the app's
          # download button hands out the matching APK), and the repo for the link.
          build-args: |
            API_BASE=${{ vars.API_BASE || 'https://api.cine-track.com' }}
            APP_VERSION=${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
            GITHUB_REPO=${{ github.repository }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- GitHub Release with the APK attached (tags only) -----------------------
  release:
    needs: [apk]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: apk
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true

  # ---- Deploy to the Dedibox over SSH (tags only) -----------------------------
  deploy:
    # Also wait on `release`: once we restart the backend it advertises the new
    # version over /api/config, and the web/mobile clients will try to fetch that
    # version's APK. Those assets must already be attached to the GitHub Release,
    # or the download 404s during the gap.
    needs: [image, web-image, release]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Pull the new images & restart on the box
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEDIBOX_HOST }}
          username: ${{ secrets.DEDIBOX_USER }}
          key: ${{ secrets.DEDIBOX_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ vars.DEDIBOX_APP_DIR }}"
            git fetch --tags --prune
            git checkout --force "${{ github.ref_name }}"
            export IMAGE_TAG="${{ github.ref_name }}"
            # Persist the deployed tag into .env.production so manual admin commands
            # (db-migrate.sh / create-user.sh, which use `docker compose run/exec`) use
            # THIS image, not a stale local :latest.
            if grep -q '^IMAGE_TAG=' .env.production 2>/dev/null; then
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_TAG}|" .env.production
            else
              printf 'IMAGE_TAG=%s\n' "${IMAGE_TAG}" >> .env.production
            fi
            COMPOSE="docker compose -f production.docker-compose.yaml --env-file .env.production"
            $COMPOSE pull backend web
            $COMPOSE up -d --remove-orphans
            docker image prune -f

      - name: Purge Cloudflare cache
        # Complements the no-cache headers on the Flutter entry files: flips
        # Cloudflare's EDGE cache instantly instead of waiting for its TTL, so new
        # visitors get the new bundle immediately. (Browsers that already cached the
        # old bundle are handled by the no-cache header, not by this purge.)
        # No-ops until CF_API_TOKEN + CF_ZONE_ID repository secrets are set.
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ZONE_ID" ]; then
            echo "CF_API_TOKEN / CF_ZONE_ID not set — skipping Cloudflare purge."
            exit 0
          fi
          curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
          echo
